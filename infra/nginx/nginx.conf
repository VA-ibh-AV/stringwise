upstream frontend { server frontend:80; }
upstream backend  { server backend:8080; }
upstream landing  { server landing:80; }

# string-wise.com → landing page
server {
    listen 80;
    server_name string-wise.com;
    location / { proxy_pass http://landing; }
}

# app.string-wise.com → React dashboard
server {
    listen 80;
    server_name app.string-wise.com;

    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# api.string-wise.com → Go backend
server {
    listen 80;
    server_name api.string-wise.com;

    client_max_body_size 50M;

    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }
}
